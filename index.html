<!DOCTYPE html>
<html>
<head>
<title>Aviola Platform</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background-color: #0f172a;
  color: white;
}

/* NAVBAR */

.navbar {
  background: #020617;
  padding: 15px;
  font-size: 18px;
  color: #22c55e;
  text-align: center;
  font-weight: bold;
}

/* MAIN BOX */

.container {
  text-align: center;
  margin-top: 40px;
}

.box {
  background: #111827;
  display: inline-block;
  padding: 20px;
  border-radius: 10px;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 5px;
  margin-top: 5px;
}

button:hover {
  background: #16a34a;
}

</style>

</head>
<body>

<div class="navbar">
Aviola Trading Platform
</div>

<div class="container">

<div class="box">

<input id="token" placeholder="Enter token">
<br>
<button onclick="connect()">Connect</button>

<p>Login: <span id="login"></span></p>
<p>Balance: <span id="balance"></span></p>
<p>Currency: <span id="currency"></span></p>

</div>

</div>

<script>

function connect() {

const TOKEN =
document.getElementById("token").value;

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = function () {

ws.send(JSON.stringify({
authorize: TOKEN
}));

};

ws.onmessage = function (msg) {

const data = JSON.parse(msg.data);

if (data.authorize) {

document.getElementById("login").innerText =
data.authorize.loginid;

document.getElementById("balance").innerText =
data.authorize.balance;

document.getElementById("currency").innerText =
data.authorize.currency;

}

};

}

</script>

</body>
</html>
