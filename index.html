<!DOCTYPE html>
<html>
<head>
  <title>Aviola Platform</title>
</head>
<body>

<h2>My Deriv Dashboard</h2>

<button onclick="connect()">Connect</button>

<p>Login: <span id="login"></span></p>
<p>Balance: <span id="balance"></span></p>
<p>Currency: <span id="currency"></span></p>

<script>

const TOKEN = "2MyyvNOIshKa67H";

function connect() {

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = function () {

ws.send(JSON.stringify({
authorize: TOKEN
}));

};

ws.onmessage = function (msg) {

const data = JSON.parse(msg.data);

if (data.authorize) {

document.getElementById("login").innerText =
data.authorize.loginid;

document.getElementById("balance").innerText =
data.authorize.balance;

document.getElementById("currency").innerText =
data.authorize.currency;

}

};

}

</script>

</body>
</html>
