<!DOCTYPE html>
<html>
<head>
  <title>Aviola Trading Platform</title>

<style>

body {
  background-color: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h2 {
  color: #22c55e;
}

.box {
  background-color: #111827;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
  display: inline-block;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
  margin: 5px;
  width: 200px;
}

button {
  padding: 10px;
  background-color: #22c55e;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background-color: #16a34a;
}

.data {
  margin-top: 10px;
}

</style>

</head>
<body>

<h2>Aviola Trading Platform</h2>

<div class="box">

<input id="token" placeholder="Enter Deriv token">
<br>
<button onclick="connect()">Connect</button>

<div class="data">
<p>Login: <span id="login"></span></p>
<p>Balance: <span id="balance"></span></p>
<p>Currency: <span id="currency"></span></p>
</div>

</div>

<script>

function connect() {

const TOKEN =
document.getElementById("token").value;

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = function () {

ws.send(JSON.stringify({
authorize: TOKEN
}));

};

ws.onmessage = function (msg) {

const data = JSON.parse(msg.data);

if (data.authorize) {

document.getElementById("login").innerText =
data.authorize.loginid;

document.getElementById("balance").innerText =
data.authorize.balance;

document.getElementById("currency").innerText =
data.authorize.currency;

}

};

ws.onerror = function () {

alert("Connection error");

};

}

</script>

</body>
</html>
