<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aviola Trading Demo</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, turquoise, lightpurple);
      color: #222;
      text-align: center;
    }

    h1 {
      font-size: 2em;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    button {
      background-color: #222;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #444;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Welcome to Aviola Trading Demo!</h1>
  <p>This site is hosted on GitHub Pages.<br>More features coming soon…</p>
  <button onclick="alert('Feature coming soon!')">Click Me</button>

  <footer>© 2026 Aviola Trading Demo</footer>
</body>
</html>
