<!DOCTYPE html>
<html>
<head>

<title>Aviola Platform</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">
Aviola Advanced Platform
</div>

<div class="layout">

<div class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('trade')">Trade</button>
<button onclick="showPage('chart')">Chart</button>
<button onclick="showPage('scanner')">Scanner</button>
<button onclick="showPage('bot')">Bot</button>

</div>

<div class="main">

<div id="dashboard" class="page active">
<h2>Dashboard</h2>
</div>

<div id="trade" class="page">
<h2>Trade</h2>
</div>

<div id="chart" class="page">

<h2>Chart</h2>

<button onclick="startTicks('R_100')">
Start Chart
</button>

<div id="chartBox"></div>

</div>

<div id="scanner" class="page">

<h2>Scanner</h2>

<button onclick="startScanner()">
Start Scanner
</button>

<div id="scanBox"></div>

</div>

<div id="bot" class="page">
<h2>Bot</h2>
</div>

</div>

</div>

<script src="ui.js"></script>
<script src="api.js"></script>
<script src="chart.js"></script>
<script src="scanner.js"></script>
<script src="bot.js"></script>

</body>
</html>
