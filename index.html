
<!DOCTYPE html>
<html>
<head>
<title>Aviola Platform</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  color: #22c55e;
  font-size: 20px;
}

.layout {
  display: flex;
}

.menu {
  width: 150px;
  background: #020617;
  height: 100vh;
}

.menu button {
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  color: white;
  text-align: left;
}

.menu button:hover {
  background: #111827;
}

.main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

.box {
  background: #111827;
  padding: 20px;
  border-radius: 10px;
  display: inline-block;
}

input {
  padding: 10px;
}

.connect {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
}

.page {
  display: none;
}

.active {
  display: block;
}

</style>

</head>
<body>

<div class="navbar">
Aviola Trading Platform
</div>

<div class="layout">

<div class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('trade')">Trade</button>
<button onclick="showPage('bot')">Bot</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<div class="box">

<input id="token" placeholder="Enter token">
<br>
<button class="connect" onclick="connect()">Connect</button>

<p>Login: <span id="login"></span></p>
<p>Balance: <span id="balance"></span></p>
<p>Currency: <span id="currency"></span></p>

</div>

</div>


<!-- TRADE -->

<div id="trade" class="page">

<h2>Trade page coming next</h2>

</div>


<!-- BOT -->

<div id="bot" class="page">

<h2>Bot builder coming next</h2>

</div>


</div>
</div>


<script>

function showPage(name) {

document.querySelectorAll(".page")
.forEach(p => p.classList.remove("active"));

document.getElementById(name)
.classList.add("active");

}


function connect() {

const TOKEN =
document.getElementById("token").value;

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = function () {

ws.send(JSON.stringify({
authorize: TOKEN
}));

};

ws.onmessage = function (msg) {

const data = JSON.parse(msg.data);

if (data.authorize) {

login.innerText = data.authorize.loginid;
balance.innerText = data.authorize.balance;
currency.innerText = data.authorize.currency;

}

};

}

</script>

</body>
</html>
