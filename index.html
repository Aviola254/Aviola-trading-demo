<!DOCTYPE html>
<html>
<head>
  <title>Deriv Test</title>
</head>
<body>

<h2>Deriv Connection Test</h2>

<button onclick="connect()">Connect</button>

<p id="out"></p>

<script>

const TOKEN = "2MyyvNOIshKa67H";

function connect() {

const ws = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);

ws.onopen = function () {

document.getElementById("out").innerText = "Connecting...";

ws.send(JSON.stringify({
authorize: TOKEN
}));

};

ws.onmessage = function (msg) {

document.getElementById("out").innerText = msg.data;

};

ws.onerror = function () {

document.getElementById("out").innerText = "Error";

};

}

</script>

</body>
</html>
